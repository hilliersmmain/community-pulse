name: CI - Testing & Quality Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov flake8 black

      - name: Code formatting check with Black
        run: |
          black --check --line-length=120 utils/ community_pulse/ tests/

      - name: Lint with Flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 utils/ community_pulse/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # General linting should block CI on violations while honoring project line-length/formatting policy.
          flake8 utils/ community_pulse/ --count --max-complexity=10 --max-line-length=120 --ignore=E203,W503,E501 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy utils/ community_pulse/ --ignore-missing-imports

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Generate coverage report
        run: |
          pytest --cov=utils --cov=community_pulse --cov-report=term --cov-report=xml --cov-fail-under=55

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Security scan with Bandit
        run: |
          pip install bandit
          # Scan Python files for common security issues
          # Keep advisory (non-blocking): this project intentionally uses random data generation for synthetic demos.
          bandit -r utils/ community_pulse/ -f json -o bandit-report.json || true
          bandit -r utils/ community_pulse/ -ll || true

      - name: Display test summary
        if: always()
        run: |
          echo "✅ Test execution completed. Check logs above for details."
